name: Update Profile Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests python-dateutil lxml

      - name: Run script to update SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: python today.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dark_mode.svg light_mode.svg cache/
          git commit -m "chore: update profile metrics" || exit 0
          git push
